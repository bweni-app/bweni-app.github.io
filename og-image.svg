<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#FBFAFE"/>
  <!-- soft violet halo -->
  <ellipse cx="900" cy="200" rx="380" ry="220" fill="#EDE9FE" opacity="0.7"/>
  <!-- mark -->
  <g transform="translate(96 96)">
    <rect width="96" height="96" rx="20" fill="#7C3AED"/>
    <g transform="translate(8 8) scale(1.25)">
      <rect x="14" y="22" width="14" height="10" rx="2" fill="#EDE9FE"/>
      <rect x="36" y="22" width="14" height="10" rx="2" fill="#EDE9FE"/>
      <rect x="12" y="32" width="40" height="8" rx="3" fill="#FFFFFF"/>
      <path d="M12 40 V48 M52 40 V48" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  <!-- wordmark -->
  <text x="220" y="172"
        font-family="Plus Jakarta Sans, ui-sans-serif"
        font-size="84" font-weight="800" fill="#0F0A1E"
        letter-spacing="-3.5">bweni</text>
  <!-- headline -->
  <text x="96" y="300"
        font-family="Plus Jakarta Sans, ui-sans-serif"
        font-size="68" font-weight="800" fill="#0F0A1E"
        letter-spacing="-2.4">Hostels near campus,</text>
  <text x="96" y="372"
        font-family="Plus Jakarta Sans, ui-sans-serif"
        font-size="68" font-weight="800" fill="#7C3AED"
        letter-spacing="-2.4">booked in minutes.</text>
  <!-- sub -->
  <text x="96" y="430"
        font-family="Plus Jakarta Sans, ui-sans-serif"
        font-size="24" font-weight="500" fill="#5A5570"
        letter-spacing="-0.3">Real beds, real prices, verified owners. For students and the people who house them.</text>
  <!-- footer -->
  <rect x="0" y="582" width="1200" height="48" fill="#7C3AED"/>
  <text x="96" y="613"
        font-family="IBM Plex Mono, ui-monospace"
        font-size="18" font-weight="500" fill="#FFFFFF">bweni.cseco.co.ke</text>
  <text x="1104" y="613" text-anchor="end"
        font-family="Plus Jakarta Sans, ui-sans-serif"
        font-size="16" font-weight="600" fill="#EDE9FE">For Kenyan students</text>
</svg>
